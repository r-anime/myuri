{% extends "base.html" %}

{% block title %}Logout - Anime Discussion Manager{% endblock %}

{% block content %}
<h2>Logout</h2>

<p>Are you sure you want to sign out?</p>

<form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn">Logout</button>
</form>
{% endblock %}
